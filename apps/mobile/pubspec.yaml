name: clanquility_mobile
description: Bright and playful household chores, meals, recipes, shopping, and calendar app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.8.0
  go_router: ^14.2.7
  flutter_riverpod: ^2.5.1
  intl: ^0.19.0
  url_launcher: ^6.3.0
  flutter_dotenv: ^5.2.1
  http: ^1.2.0
  shared_preferences: ^2.3.4
  image_picker: ^1.1.2
  connectivity_plus: ^6.1.0
  share_plus: ^10.0.0
  path_provider: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
